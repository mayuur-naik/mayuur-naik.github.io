<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayur Naik | Portfolio</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            padding: 40px;
            text-align: center;
            background: #1e293b;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h1 {
            color: #38bdf8;
            margin-bottom: 10px;
        }
        h2 {
            font-size: 1.2rem;
            color: #94a3b8;
            font-weight: 400;
            margin-top: 0;
        }
        p {
            color: #cbd5e1;
            font-size: 1.1rem;
        }
        .links {
            margin-top: 30px;
        }
        .btn {
            display: inline-block;
            background: #0284c7;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #0369a1;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hi, I'm Mayur Naik</h1>
        <h2>Developer & Builder</h2>
        <hr style="border-color: #334155; margin: 20px 0;">
        <p>Welcome to my brand new portfolio website! I am currently setting up my custom domain and building out my projects here. Stay tuned!</p>
        
        <div class="links">
            <a href="#" class="btn">View My Projects</a>
        </div>
    </div>

</body>
</html>
